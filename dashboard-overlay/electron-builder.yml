appId: org.k10mediabroadcaster.broadcaster
productName: K10 Media Broadcaster
copyright: Copyright (c) 2026 Kevin Conboy

files:
  - main.js
  - preload.js
  - remote-server.js
  - dashboard.html
  - modules/**/*
  - images/**/*
  - data/**/*
  - streamdeck/**/*
  - "!**/node_modules/**/*"
  - "!**/tests/**/*"
  - "!**/test-results/**/*"
  - "!playwright.config.*"

icon: images/branding/icon.png

win:
  icon: images/branding/icon.ico
  target:
    - target: nsis
      arch:
        - x64
  artifactName: "K10-Media-Broadcaster-Setup-${version}.${ext}"

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  installerIcon: images/branding/icon.ico
  uninstallerIcon: images/branding/icon.ico
  installerHeaderIcon: images/branding/icon.ico
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: K10 Media Broadcaster

mac:
  category: public.app-category.utilities
  icon: images/branding/icon.icns
  darkModeSupport: true
  target:
    - target: dmg
      arch:
        - x64
        - arm64

dmg:
  title: K10 Media Broadcaster
  contents:
    - x: 130
      "y": 220
    - x: 410
      "y": 220
      type: link
      path: /Applications

publish:
  provider: github
  owner: alternatekev
  repo: media-coach-simhub-plugin
  releaseType: release
