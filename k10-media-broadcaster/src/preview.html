<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>K10 Media Broadcaster — Race End Preview</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800;900&family=Barlow+Semi+Condensed:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap');

    :root {
      --corner-r: 8px;
      --corner-r-sm: 5px;
      --ff: 'Barlow Condensed', 'Corbel', 'Segoe UI', system-ui, sans-serif;
      --ff-mono: 'JetBrains Mono', 'Consolas', 'SF Mono', monospace;
      --ff-semi: 'Barlow Semi Condensed', var(--ff);
      --fw-black: 800;
      --fw-bold: 700;
      --fw-semi: 600;
      --fw-medium: 500;
      --fw-regular: 400;
      --text-primary: hsla(0, 0%, 100%, 1.0);
      --text-secondary: hsla(0, 0%, 100%, 0.69);
      --text-dim: hsla(0, 0%, 100%, 0.55);
      --red: #e53935;
      --green: #43a047;
      --blue: #1e88e5;
      --amber: #ffb300;
      --orange: #fb8c00;
      --cyan: #00acc1;
      --purple: hsl(280, 80%, 70%);
      --t-fast: 180ms ease;
      --t-med: 350ms ease;
      --t-slow: 600ms ease-out;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      color: white;
      font-family: var(--ff);
      overflow: hidden;
    }

    /* ── Demo Race End Screen Styles ── */

    .demo-race-end {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      animation: demo-fade-in 0.6s ease-out both;
    }

    @keyframes demo-fade-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .demo-backdrop {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: hsla(0, 0%, 0%, 0.85);
      backdrop-filter: blur(4px);
    }

    .demo-confetti {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .demo-confetti-particle {
      position: absolute;
      top: -12px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      opacity: 0.8;
      background: var(--amber);
      animation: demo-confetti-drift 3s ease-in forwards;
    }
    .demo-confetti-particle:nth-child(even) { background: var(--cyan); width: 6px; height: 10px; border-radius: 2px; }
    .demo-confetti-particle:nth-child(3n) { background: var(--red); }
    .demo-confetti-particle:nth-child(4n) { background: var(--green); width: 10px; height: 6px; border-radius: 2px; }
    .demo-confetti-particle:nth-child(5n) { background: #fff; width: 4px; height: 4px; }

    @keyframes demo-confetti-drift {
      to {
        transform: translateY(calc(100vh + 20px)) rotate(720deg);
        opacity: 0;
      }
    }

    .demo-content {
      position: relative;
      z-index: 1;
      text-align: center;
      animation: demo-content-in 0.6s ease-out both;
    }

    @keyframes demo-content-in {
      from { opacity: 0; transform: scale(0.9) translateY(-20px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .demo-position {
      font-family: var(--ff-mono);
      font-size: 120px;
      font-weight: var(--fw-black);
      line-height: 1;
      margin-bottom: 16px;
      letter-spacing: -0.05em;
      animation: demo-pos-reveal 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes demo-pos-reveal {
      from { opacity: 0; transform: scale(0); }
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes demo-gold-pulse {
      0%, 100% { text-shadow: 0 0 40px hsla(45, 100%, 50%, 0.6); }
      50% { text-shadow: 0 0 80px hsla(45, 100%, 50%, 1), 0 0 120px hsla(45, 100%, 50%, 0.4); }
    }

    .tint-gold .demo-position {
      color: #ffb300;
      animation: demo-pos-reveal 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) both,
                 demo-gold-pulse 2s ease-in-out 0.6s infinite;
    }
    .tint-silver .demo-position { color: #c0c0c0; text-shadow: 0 0 40px hsla(0, 0%, 75%, 0.5); }
    .tint-bronze .demo-position { color: #cd7f32; text-shadow: 0 0 40px hsla(30, 80%, 50%, 0.5); }
    .tint-green .demo-position { color: var(--green); text-shadow: 0 0 30px hsla(120, 60%, 50%, 0.4); }
    .tint-purple .demo-position { color: var(--purple); text-shadow: 0 0 30px hsla(280, 80%, 70%, 0.3); }
    .tint-neutral .demo-position { color: var(--text-primary); opacity: 0.8; }

    .demo-title-block { margin-bottom: 24px; }

    .demo-title {
      font-family: var(--ff);
      font-size: 56px;
      font-weight: var(--fw-black);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin: 0;
      line-height: 1.2;
      color: var(--text-primary);
    }

    .demo-subtitle {
      font-family: var(--ff-semi);
      font-size: 16px;
      font-weight: var(--fw-regular);
      color: var(--text-secondary);
      margin: 8px auto 0;
      max-width: 400px;
    }

    .demo-clean-badge {
      display: inline-block;
      padding: 8px 16px;
      background: hsla(120, 60%, 50%, 0.15);
      border: 1px solid var(--green);
      border-radius: var(--corner-r);
      color: var(--green);
      font-family: var(--ff);
      font-size: 12px;
      font-weight: var(--fw-bold);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 24px;
      animation: demo-content-in 0.6s ease-out 0.2s both;
    }
    .demo-clean-badge span { margin-right: 6px; font-weight: var(--fw-black); }

    .demo-stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-top: 24px;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
    }

    .demo-stat-item {
      padding: 12px;
      background: hsla(0, 0%, 100%, 0.05);
      border: 1px solid hsla(0, 0%, 100%, 0.1);
      border-radius: var(--corner-r-sm);
      animation: demo-content-in 0.5s ease-out 0.4s both;
    }

    .tint-gold .demo-stat-item { border-color: hsla(45, 100%, 50%, 0.3); background: hsla(45, 100%, 50%, 0.08); }
    .tint-silver .demo-stat-item { border-color: hsla(0, 0%, 75%, 0.3); background: hsla(0, 0%, 75%, 0.08); }
    .tint-bronze .demo-stat-item { border-color: hsla(30, 80%, 50%, 0.3); background: hsla(30, 80%, 50%, 0.08); }
    .tint-green .demo-stat-item { border-color: hsla(120, 60%, 50%, 0.2); background: hsla(120, 60%, 50%, 0.08); }
    .tint-purple .demo-stat-item { border-color: hsla(280, 80%, 70%, 0.2); background: hsla(280, 80%, 70%, 0.08); }

    .demo-stat-label {
      font-family: var(--ff);
      font-size: 10px;
      font-weight: var(--fw-semi);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      margin-bottom: 6px;
    }

    .demo-stat-value {
      font-family: var(--ff-mono);
      font-size: 16px;
      font-weight: var(--fw-bold);
      color: var(--text-primary);
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/demo-preview.tsx"></script>
</body>
</html>
