<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>K10 Media Coach Dashboard</title>
<!--
  SimHub HTML Dashboard — K10 Media Coach
  ════════════════════════════════════════════════════════════════

  JS API (call from SimHub JavascriptExtensions or NCalc bindings):

    updateTacho(pct)              — 0.0-1.0, drives tachometer segments + RPM color
    renderHist(id, data[])        — 20-element array of 0.0-1.0 values for pedal histograms
                                    IDs: 'throttleHist', 'brakeHist', 'clutchHist'
    updateIRBar(iRating)          — integer iRating value, bar fills 0-5000 range
    updateSRPie(srValue)          — 0.0-4.0 safety rating value
    cycleRatingPos()              — toggle between iRating/SR page and Position page
    showCommentary(hue, title, text, meta) — show commentary panel with sentiment color
    hideCommentary()              — dismiss commentary panel
    cycleCarLogo()                — cycle through manufacturer logos
    flashElement(el, className)   — trigger value-change flash animation

  SimHub properties → HTML elements (set via innerText/textContent):

    Gear         → #gearText
    RPM          → #rpmText
    Speed        → #speedText
    Fuel L       → .fuel-remaining (innerHTML with unit span)
    Fuel bar     → .fuel-bar-inner (style.width as %)
    Tyre temps   → .tyre-cell elements (FL/FR/RL/RR)
    BB/TC/ABS    → .ctrl-value + --ctrl-pct CSS variable
    Position     → .pos-number (both in cycle-sizer and positionPage)
    Lap          → .pos-meta-row .val
    Best lap     → .pos-meta-row .val.purple
    iRating      → .rating-value (first .rating-item)
    Safety       → .rating-value (second .rating-item)
    Gap ahead    → .gap-time.ahead + .gap-driver + .gap-ir
    Gap behind   → .gap-time.behind + .gap-driver + .gap-ir

  ════════════════════════════════════════════════════════════════
-->
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --corner-r: 8px;
    --corner-r-sm: 5px;
    --gap: 4px;
    --pad: 6px;

    --dash-h: 200px;
    --row-h: calc((var(--dash-h) - var(--gap)) / 2);

    --bg: hsla(0, 0%, 14%, 0.42);
    --bg-panel: hsla(0, 0%, 10%, 0.55);
    --bg-logo: hsla(0, 0%, 6%, 0.72);
    --border: hsla(0, 0%, 100%, 0.07);
    --text-primary: hsla(0, 0%, 100%, 0.92);
    --text-secondary: hsla(0, 0%, 100%, 0.55);
    --text-dim: hsla(0, 0%, 100%, 0.30);

    --red: #e53935;
    --green: #43a047;
    --blue: #1e88e5;
    --amber: #ffb300;
    --orange: #fb8c00;
    --cyan: #00acc1;
    --purple: hsl(280,80%,70%);

    --ff: 'Corbel', 'Segoe UI', system-ui, sans-serif;
    --fs-xl: 18px;
    --fs-lg: 12px;
    --fs-md: 10px;
    --fs-sm: 9px;
    --fs-xs: 7.5px;
    --fw-black: 900;
    --fw-bold: 700;
    --fw-semi: 600;
    --fw-medium: 500;
    --fw-regular: 400;

    --t-fast: 180ms ease;
    --t-med: 350ms ease;
    --t-slow: 600ms ease-out;

    --sentiment-h: 0;
    --sentiment-s: 0%;
    --sentiment-l: 0%;
    --sentiment-alpha: 0;
  }

  body {
    font-family: var(--ff);
    color: var(--text-primary);
    background: transparent;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    position: relative;
    margin: 0;
    padding: 0;
  }

  .dashboard {
    position: absolute;
    top: 10px;
    right: 10px;
    display: flex;
    flex-direction: row-reverse;
    gap: var(--gap);
    height: var(--dash-h);
    filter: drop-shadow(0 4px 20px rgba(0,0,0,0.55));
    transition: all var(--t-slow);
  }
  .dashboard::before {
    content: '';
    position: absolute;
    inset: -2px;
    border-radius: calc(var(--corner-r) + 2px);
    background: hsla(var(--sentiment-h), var(--sentiment-s), var(--sentiment-l), var(--sentiment-alpha));
    pointer-events: none;
    z-index: 0;
    transition: background 1s ease;
  }
  .dashboard > * { position: relative; z-index: 1; }

  .panel {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 0;
    padding: var(--pad);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    transition: background var(--t-slow), border-color var(--t-med);
    overflow: hidden;
  }

  /* ── UNIFIED GRID ROUNDING ──
     Only outer corners of the non-logo block grid get radius.
     Inner corners where panels meet through gaps stay square. */
  .fuel-block  { border-top-left-radius: var(--corner-r); }
  .tyres-block { border-bottom-left-radius: var(--corner-r); }
  .tacho-block {
    border-top-right-radius: var(--corner-r);
    border-bottom-right-radius: var(--corner-r);
  }
  .panel-label {
    font-size: var(--fs-xs);
    font-weight: var(--fw-semi);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    margin-bottom: 2px;
    white-space: nowrap;
  }

  /* ── COMMENTARY ── */
  .commentary-col {
    width: 0;
    opacity: 0;
    overflow: hidden;
    transition: width 0.55s cubic-bezier(0.22, 1, 0.36, 1),
                opacity 0.45s ease 0.05s;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }
  .commentary-col.visible {
    width: 240px;
    opacity: 1;
  }
  .commentary-inner {
    width: 240px;
    background: hsla(var(--commentary-h, 0), 50%, 22%, 0.48);
    border: 1px solid hsla(var(--commentary-h, 0), 50%, 45%, 0.25);
    border-radius: var(--corner-r);
    padding: 10px;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    transition: background 0.8s ease, border-color 0.8s ease;
  }
  .commentary-title {
    font-size: var(--fs-xl);
    font-weight: var(--fw-black);
    line-height: 1.1;
    margin-bottom: 5px;
  }
  .commentary-text {
    font-size: var(--fs-lg);
    font-weight: var(--fw-medium);
    line-height: 1.4;
    color: var(--text-primary);
  }
  .commentary-meta {
    font-size: var(--fs-xs);
    font-weight: var(--fw-semi);
    color: var(--text-secondary);
    margin-top: 6px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  /* ── MAIN AREA ── */
  .main-area {
    display: flex;
    flex-direction: row;
    gap: var(--gap);
    align-items: stretch;
    height: 100%;
  }

  /* ── CYCLING ── */
  .cycle-container { position: relative; overflow: hidden; }
  .cycle-page {
    transition: opacity 1s ease;
    position: absolute;
    inset: 0;
    padding: var(--pad);
  }
  .cycle-page.active { opacity: 1; z-index: 2; }
  .cycle-page.inactive { opacity: 0; z-index: 1; }
  .cycle-sizer { visibility: hidden; position: relative; padding: var(--pad); }
  .cycle-dots {
    position: absolute;
    bottom: 3px;
    left: 0; right: 0;
    display: flex;
    justify-content: center;
    gap: 3px;
    z-index: 5;
  }
  .cycle-dot {
    width: 3px; height: 3px;
    border-radius: 50%;
    background: hsla(0,0%,100%,0.2);
    transition: background 0.3s;
  }
  .cycle-dot.active { background: hsla(0,0%,100%,0.6); }

  /* ═══════════════════════════════════════════════
     COL: LOGO (two stacked squares)
     ═══════════════════════════════════════════════ */
  .logo-col {
    display: flex;
    flex-direction: column;
    gap: var(--gap);
    flex-shrink: 0;
  }
  .logo-square {
    background: var(--bg-logo);
    display: flex;
    align-items: center;
    justify-content: center;
    width: var(--row-h);
    height: var(--row-h);
    border-radius: 0;
    border: 1px solid var(--border);
    flex-shrink: 0;
    overflow: hidden;
  }
  .logo-col .logo-square:first-child {
    border-top-left-radius: var(--corner-r);
    border-top-right-radius: var(--corner-r);
  }
  .logo-col .logo-square:last-child {
    border-bottom-left-radius: var(--corner-r);
    border-bottom-right-radius: var(--corner-r);
  }
  .logo-square img {
    width: 56px;
    height: auto;
    opacity: 0.92;
  }
  .logo-square svg {
    width: 60%;
    height: 60%;
    opacity: 0.8;
  }

  /* ═══════════════════════════════════════════════
     TACH — gear top-left, RPM top-right, speed+MPH beneath RPM
     segments fill bottom
     ═══════════════════════════════════════════════ */
  .tacho-block {
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    width: 140px;
  }
  .tacho-top-row {
    display: flex;
    align-items: flex-start;
  }
  .tacho-gear {
    font-size: 48px;
    font-weight: var(--fw-black);
    line-height: 0.85;
    text-align: left;
  }
  .tacho-speed-cluster {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    margin-left: auto;
  }
  .tacho-rpm {
    font-size: var(--fs-lg);
    font-weight: var(--fw-bold);
    font-variant-numeric: tabular-nums;
    transition: color 0.2s ease;
    text-align: right;
    line-height: 1;
  }
  .speed-value {
    font-size: 26px;
    font-weight: var(--fw-black);
    line-height: 1;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.03em;
    text-align: right;
  }
  .speed-unit {
    font-size: var(--fs-xs);
    font-weight: var(--fw-medium);
    color: var(--text-dim);
    text-align: right;
    line-height: 1;
  }
  .tacho-bar-track {
    display: flex;
    gap: 2px;
    flex: 1;
    align-items: stretch;
    margin-top: 4px;
  }
  .tacho-seg {
    flex: 1;
    border-radius: 3px;
    background: hsla(0,0%,100%,0.06);
    transition: background var(--t-fast);
    height: 100%;
  }
  .tacho-seg.lit-green  { background: var(--green); }
  .tacho-seg.lit-yellow { background: var(--amber); }
  .tacho-seg.lit-red    { background: var(--red); box-shadow: 0 0 4px var(--red); }
  .tacho-seg.lit-redline { background: var(--red); box-shadow: 0 0 8px var(--red); animation: redline-pulse 0.3s ease-in-out infinite alternate; }
  @keyframes redline-pulse { 0%{opacity:.7} 100%{opacity:1} }

  /* ═══════════════════════════════════════════════
     POSITION/RATING + GAPS
     ═══════════════════════════════════════════════ */
  .pos-gaps-col {
    display: flex;
    flex-direction: column;
    gap: var(--gap);
    flex-shrink: 0;
    width: 150px;
  }
  .rating-pos-block {
    width: 100%;
    flex: 1;
  }
  .rating-value {
    font-size: 20px;
    font-weight: var(--fw-black);
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .rating-delta {
    font-size: var(--fs-sm);
    font-weight: var(--fw-semi);
    margin-top: 2px;
  }
  .rating-delta.positive { color: var(--green); }
  .rating-delta.negative { color: var(--red); }
  .rating-row {
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .rating-item { flex: 1; text-align: center; }

  /* iRating horizontal bar */
  .ir-bar-container {
    margin-top: 4px;
  }
  .ir-bar-track {
    position: relative;
    height: 8px;
    background: hsla(0,0%,100%,0.06);
    border-radius: 2px;
    overflow: visible;
  }
  .ir-bar-fill {
    height: 100%;
    border-radius: 2px;
    background: linear-gradient(90deg, hsl(200,60%,40%), hsl(200,70%,55%));
    transition: width var(--t-med);
  }
  .ir-bar-ticks {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }
  .ir-bar-tick {
    position: absolute;
    top: -2px;
    bottom: -2px;
    width: 1px;
    background: hsla(0,0%,100%,0.25);
  }
  .ir-bar-tick-label {
    position: absolute;
    top: 10px;
    font-size: 6px;
    font-weight: var(--fw-medium);
    color: var(--text-dim);
    transform: translateX(-50%);
    font-variant-numeric: tabular-nums;
  }

  /* Safety Rating pie chart */
  .sr-pie-container {
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 2px;
  }
  .sr-pie-svg {
    width: 36px;
    height: 36px;
  }
  .sr-pie-bg {
    fill: none;
    stroke: hsla(0,0%,100%,0.06);
    stroke-width: 5;
  }
  .sr-pie-fill {
    fill: none;
    stroke-width: 5;
    stroke-linecap: round;
    transition: stroke-dashoffset var(--t-med), stroke var(--t-med);
    transform: rotate(-90deg);
    transform-origin: center;
  }
  /* sr-pie-text removed */

  .pos-layout {
    display: flex;
    align-items: center;
    gap: 4px;
    height: 100%;
  }
  .pos-number {
    font-size: 42px;
    font-weight: var(--fw-black);
    line-height: 1;
    letter-spacing: -0.03em;
    text-align: left;
    flex-shrink: 0;
  }
  .skew-accent { transform: skewX(-6deg); display: inline-block; }
  .pos-meta {
    display: flex;
    flex-direction: column;
    gap: 1px;
    margin-left: auto;
  }
  .pos-meta-row {
    font-size: var(--fs-sm);
    font-weight: var(--fw-medium);
    color: var(--text-secondary);
    text-align: right;
  }
  .pos-meta-row .val {
    font-weight: var(--fw-bold);
    color: var(--text-primary);
  }
  .pos-meta-row .val.purple { color: var(--purple); }

  /* Gaps — side-by-side */
  .gaps-block {
    display: flex;
    flex-direction: row;
    gap: 3px;
    flex: 1;
  }
  .gap-item {
    flex: 1;
    text-align: center;
    padding: 4px;
    border-radius: var(--corner-r-sm);
    position: relative;
    overflow: hidden;
    transition: all var(--t-med);
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 1px;
  }
  .gap-item::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    opacity: 0;
    pointer-events: none;
  }
  .gap-item.ahead-changed::after { animation: value-flash 1.4s ease-out forwards; }
  .gap-item.ahead-changed { --flash-color: hsla(123, 60%, 45%, 0.16); }
  .gap-item.behind-changed::after { animation: value-flash 1.4s ease-out forwards; }
  .gap-item.behind-changed { --flash-color: hsla(15, 80%, 50%, 0.16); }
  .gap-item.gap-closing::after  { animation: value-flash 1.4s ease-out forwards; }
  .gap-item.gap-closing  { --flash-color: hsla(0, 65%, 50%, 0.18); }
  .gap-item.gap-growing::after  { animation: value-flash 1.4s ease-out forwards; }
  .gap-item.gap-growing  { --flash-color: hsla(123, 55%, 45%, 0.14); }

  .gap-driver {
    font-size: var(--fs-xs);
    font-weight: var(--fw-medium);
    color: var(--text-secondary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .gap-time {
    font-size: 16px;
    font-weight: var(--fw-black);
    font-variant-numeric: tabular-nums;
    line-height: 1.1;
  }
  .gap-time.ahead { color: var(--green); }
  .gap-time.behind { color: var(--red); }
  .gap-ir {
    font-size: var(--fs-xs);
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
  }

  /* ═══════════════════════════════════════════════
     MAPS — stacked
     ═══════════════════════════════════════════════ */
  .maps-col {
    display: flex;
    flex-direction: column;
    gap: var(--gap);
    flex-shrink: 0;
    width: 96px;
  }
  .map-panel {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .map-svg { width: 92%; height: 92%; }
  .map-track {
    fill: none;
    stroke: hsla(0,0%,100%,0.12);
    stroke-width: 3;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .map-player {
    fill: var(--cyan);
    filter: drop-shadow(0 0 3px var(--cyan));
  }
  .map-opponent { fill: hsla(0,0%,100%,0.35); }
  .map-opponent.close { fill: var(--orange); }

  .map-zoom-panel {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .map-zoom-svg {
    width: 280px;
    height: 280px;
    transition: transform 0.3s ease;
  }
  .map-zoom-label {
    position: absolute;
    bottom: 4px;
    left: 0; right: 0;
    text-align: center;
    font-size: var(--fs-xs);
    color: var(--text-dim);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  /* ═══════════════════════════════════════════════
     CONTROLS + LAYERED PEDALS
     ═══════════════════════════════════════════════ */
  .controls-pedals-block {
    display: flex;
    flex-direction: column;
    gap: var(--gap);
    flex-shrink: 0;
    width: 170px;
  }

  .car-controls {
    display: flex;
    gap: var(--gap);
    flex: 1;
  }
  .ctrl-item {
    flex: 1;
    text-align: center;
    padding: 4px;
    border-radius: var(--corner-r-sm);
    background: hsla(0,0%,100%,0.03);
    border: 1px solid transparent;
    transition: all var(--t-med);
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
  }
  .ctrl-item::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    opacity: 0;
    pointer-events: none;
  }
  .ctrl-item.changed::after { animation: value-flash 1.4s ease-out forwards; }
  @keyframes value-flash {
    0%   { background: var(--flash-color, hsla(45,100%,60%,0.22)); }
    100% { background: transparent; }
  }
  .ctrl-item { --flash-color: hsla(45, 80%, 55%, 0.18); --ctrl-pct: 0%; }
  .ctrl-item::before {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: var(--ctrl-pct);
    background: hsla(0,0%,100%,0.04);
    pointer-events: none;
    transition: height var(--t-med);
  }
  .ctrl-label {
    font-size: var(--fs-xs);
    font-weight: var(--fw-semi);
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    position: relative;
    z-index: 1;
  }
  .ctrl-value {
    font-size: 22px;
    font-weight: var(--fw-black);
    position: relative;
    z-index: 1;
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }

  /* Layered pedals — all three histograms overlaid */
  .pedals-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .pedal-labels-row {
    display: flex;
    gap: 6px;
    justify-content: space-around;
  }
  .pedal-label-group {
    text-align: center;
  }
  .pedal-channel-label {
    font-size: var(--fs-xs);
    font-weight: var(--fw-semi);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .pedal-channel-label.throttle { color: var(--green); }
  .pedal-channel-label.brake { color: var(--red); }
  .pedal-channel-label.clutch { color: var(--blue); }
  .pedal-pct {
    font-size: var(--fs-xs);
    font-weight: var(--fw-bold);
    font-variant-numeric: tabular-nums;
    line-height: 1.1;
  }
  .pedal-viz-stack {
    flex: 1;
    position: relative;
  }
  .pedal-viz-layer {
    position: absolute;
    inset: 0;
    display: flex;
    gap: 1px;
    align-items: flex-end;
  }
  .pedal-viz-layer.throttle-layer { z-index: 1; }
  .pedal-viz-layer.brake-layer { z-index: 2; }
  .pedal-viz-layer.clutch-layer { z-index: 3; }
  .pedal-hist-bar {
    flex: 1;
    border-radius: 1px 1px 0 0;
    min-height: 1px;
    transition: height 60ms linear;
  }
  .pedal-hist-bar.throttle { background: var(--green); opacity: 0.45; }
  .pedal-hist-bar.brake { background: var(--red); opacity: 0.55; }
  .pedal-hist-bar.clutch { background: var(--blue); opacity: 0.45; }
  .pedal-hist-bar.live { opacity: 1; flex: 0 0 4px; border-radius: 2px; }

  /* ═══════════════════════════════════════════════
     FUEL + TYRES (separate stacked panels)
     ═══════════════════════════════════════════════ */
  .fuel-tyres-col {
    display: flex;
    flex-direction: column;
    gap: var(--gap);
    flex-shrink: 0;
    width: 160px;
  }
  .fuel-block, .tyres-block {
    flex: 1;
  }

  .fuel-remaining {
    font-size: 22px;
    font-weight: var(--fw-black);
    line-height: 1;
    font-variant-numeric: tabular-nums;
    text-align: center;
    margin-bottom: 2px;
  }
  .fuel-remaining .unit {
    font-size: var(--fs-lg);
    font-weight: var(--fw-semi);
    color: var(--text-secondary);
  }
  .fuel-bar-outer {
    height: 8px;
    border-radius: 2px;
    background: hsla(0,0%,100%,0.06);
    position: relative;
    overflow: hidden;
    margin-bottom: 3px;
  }
  .fuel-bar-inner {
    height: 100%;
    border-radius: 2px;
    transition: width var(--t-med), background var(--t-med);
  }
  .fuel-bar-inner.healthy { background: linear-gradient(90deg, hsl(123,45%,35%), hsl(123,50%,45%)); }
  .fuel-bar-inner.caution { background: linear-gradient(90deg, hsl(35,90%,40%), hsl(45,100%,50%)); }
  .fuel-bar-inner.critical { background: linear-gradient(90deg, hsl(0,70%,35%), hsl(0,70%,50%)); animation: fuel-warn 1s ease-in-out infinite alternate; }
  @keyframes fuel-warn { 0%{opacity:.7} 100%{opacity:1} }
  .fuel-bar-pit-marker {
    position: absolute;
    top: 0; bottom: 0;
    width: 2px;
    background: var(--text-primary);
    opacity: 0.7;
  }
  .fuel-stats {
    display: flex;
    flex-wrap: wrap;
    gap: 2px 6px;
    font-size: var(--fs-xs);
    font-weight: var(--fw-medium);
    color: var(--text-secondary);
    font-variant-numeric: tabular-nums;
    justify-content: center;
  }
  .fuel-stats .val { font-weight: var(--fw-bold); color: var(--text-primary); }
  .fuel-pit-suggest {
    font-size: var(--fs-xs);
    font-weight: var(--fw-bold);
    color: var(--amber);
    margin-top: 2px;
    text-align: center;
  }

  .tyre-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 3px;
  }
  .tyre-cell {
    font-size: 13px;
    font-weight: var(--fw-black);
    text-align: center;
    padding: 3px 2px;
    border-radius: 4px;
    font-variant-numeric: tabular-nums;
    border: 1px solid hsla(0,0%,100%,0.05);
  }
  .tyre-cell.cold { color: hsl(200,70%,60%); border-color: hsla(200,70%,60%,0.15); }
  .tyre-cell.optimal { color: var(--green); border-color: hsla(123,40%,50%,0.15); }
  .tyre-cell.hot { color: var(--amber); border-color: hsla(45,100%,50%,0.12); }
  .tyre-cell.danger { color: var(--red); border-color: hsla(0,70%,50%,0.15); }
  .tyre-label {
    font-size: 6px;
    color: var(--text-dim);
    text-align: center;
  }
  .tyre-wear-bar {
    height: 2px;
    border-radius: 2px;
    background: hsla(0,0%,100%,0.06);
    margin-top: 1px;
  }
  .tyre-wear-fill {
    height: 100%;
    border-radius: 2px;
    background: var(--green);
  }

</style>
</head>
<body>

<div class="dashboard" id="dashboard">

  <div class="main-area">

    <!-- COL: Fuel (top) + Tyres (bottom) — separate panels -->
    <div class="fuel-tyres-col">
      <div class="panel fuel-block">
        <div class="panel-label">Fuel</div>
        <div class="fuel-remaining">— <span class="unit">L</span></div>
        <div class="fuel-bar-outer">
          <div class="fuel-bar-inner healthy" style="width: 0%;"></div>
        </div>
        <div class="fuel-stats">
          <span>Avg <span class="val">—</span> L/lap</span>
          <span>Est <span class="val">—</span> laps</span>
        </div>
        <div class="fuel-pit-suggest"></div>
      </div>
      <div class="panel tyres-block">
        <div class="panel-label">Tyres °F</div>
        <div class="tyre-grid">
          <div><div class="tyre-label">FL</div><div class="tyre-cell">—</div><div class="tyre-wear-bar"><div class="tyre-wear-fill" style="width:0%;"></div></div></div>
          <div><div class="tyre-label">FR</div><div class="tyre-cell">—</div><div class="tyre-wear-bar"><div class="tyre-wear-fill" style="width:0%;"></div></div></div>
          <div><div class="tyre-label">RL</div><div class="tyre-cell">—</div><div class="tyre-wear-bar"><div class="tyre-wear-fill" style="width:0%;"></div></div></div>
          <div><div class="tyre-label">RR</div><div class="tyre-cell">—</div><div class="tyre-wear-bar"><div class="tyre-wear-fill" style="width:0%;"></div></div></div>
        </div>
      </div>
    </div>

    <!-- COL: Controls + Layered Pedals -->
    <div class="controls-pedals-block">
      <div class="panel car-controls">
        <div class="ctrl-item" style="--ctrl-pct:0%;"><div class="ctrl-label">BB</div><div class="ctrl-value">—</div></div>
        <div class="ctrl-item" style="--ctrl-pct:0%;"><div class="ctrl-label">TC</div><div class="ctrl-value">—</div></div>
        <div class="ctrl-item" style="--ctrl-pct:0%;"><div class="ctrl-label">ABS</div><div class="ctrl-value">—</div></div>
      </div>
      <div class="panel pedals-area" id="pedalsArea">
        <div class="pedal-labels-row">
          <div class="pedal-label-group">
            <div class="pedal-channel-label throttle">THR</div>
            <div class="pedal-pct" style="color:var(--green);">0%</div>
          </div>
          <div class="pedal-label-group">
            <div class="pedal-channel-label brake">BRK</div>
            <div class="pedal-pct" style="color:var(--red);">0%</div>
          </div>
          <div class="pedal-label-group">
            <div class="pedal-channel-label clutch">CLT</div>
            <div class="pedal-pct" style="color:var(--blue);">0%</div>
          </div>
        </div>
        <div class="pedal-viz-stack">
          <div class="pedal-viz-layer throttle-layer" id="throttleHist"></div>
          <div class="pedal-viz-layer brake-layer" id="brakeHist"></div>
          <div class="pedal-viz-layer clutch-layer" id="clutchHist"></div>
        </div>
      </div>
    </div>

    <!-- COL: Maps stacked -->
    <div class="maps-col">
      <div class="panel map-panel">
        <svg class="map-svg" viewBox="0 0 100 100">
          <path class="map-track" d="M 20,80 C 10,80 5,65 10,50 C 15,30 30,15 50,12 C 70,9 85,20 90,40 C 95,60 85,75 70,80 C 60,83 45,82 35,78 Z" />
          <circle class="map-opponent" cx="15" cy="55" r="2.5" />
          <circle class="map-opponent close" cx="30" cy="76" r="3" />
          <circle class="map-opponent" cx="55" cy="13" r="2.5" />
          <circle class="map-opponent" cx="88" cy="45" r="2.5" />
          <circle class="map-player" cx="25" cy="78" r="4" />
        </svg>
        <div class="map-zoom-label">Full</div>
      </div>
      <div class="panel map-zoom-panel">
        <svg class="map-zoom-svg" id="zoomMapSvg" viewBox="0 0 100 100">
          <path class="map-track" d="M 20,80 C 10,80 5,65 10,50 C 15,30 30,15 50,12 C 70,9 85,20 90,40 C 95,60 85,75 70,80 C 60,83 45,82 35,78 Z" style="stroke-width:1.5;" />
          <circle class="map-opponent close" cx="30" cy="76" r="1.5" />
          <circle class="map-player" cx="25" cy="78" r="2" />
        </svg>
        <div class="map-zoom-label">Local</div>
      </div>
    </div>

    <!-- COL: Position/Rating + Gaps -->
    <div class="pos-gaps-col">
      <div class="panel cycle-container rating-pos-block" id="cycleRatingPos">
        <div class="cycle-sizer">
          <div class="pos-layout">
            <div class="pos-number"><span class="skew-accent">P—</span></div>
            <div class="pos-meta">
              <div class="pos-meta-row">Lap <span class="val">—</span></div>
              <div class="pos-meta-row"><span class="val purple">—:——.———</span></div>
            </div>
          </div>
        </div>
        <!-- Page A: iRating + SR with charts -->
        <div class="cycle-page active" id="ratingPage">
          <div class="rating-row">
            <div class="rating-item">
              <div class="panel-label">iRating</div>
              <div class="rating-value">—</div>
              <div class="rating-delta">—</div>
              <div class="ir-bar-container">
                <div class="ir-bar-track">
                  <div class="ir-bar-fill" id="irBarFill" style="width: 0%;"></div>
                  <div class="ir-bar-ticks">
                    <div class="ir-bar-tick" style="left: 20%;"></div>
                    <div class="ir-bar-tick-label" style="left: 20%;">1k</div>
                    <div class="ir-bar-tick" style="left: 40%;"></div>
                    <div class="ir-bar-tick-label" style="left: 40%;">2k</div>
                    <div class="ir-bar-tick" style="left: 60%;"></div>
                    <div class="ir-bar-tick-label" style="left: 60%;">3k</div>
                    <div class="ir-bar-tick" style="left: 80%;"></div>
                    <div class="ir-bar-tick-label" style="left: 80%;">4k</div>
                  </div>
                </div>
              </div>
            </div>
            <div class="rating-item">
              <div class="panel-label">Safety</div>
              <div class="rating-value" style="font-size:14px;">—</div>
              <div class="rating-delta">—</div>
              <div class="sr-pie-container">
                <svg class="sr-pie-svg" viewBox="0 0 40 40">
                  <circle class="sr-pie-bg" cx="20" cy="20" r="15"/>
                  <circle class="sr-pie-fill" id="srPieFill" cx="20" cy="20" r="15"
                    stroke="var(--green)"
                    stroke-dasharray="94.25"
                    stroke-dashoffset="18.85"/>
                  <!-- no text overlay -->
                </svg>
              </div>
            </div>
          </div>
        </div>
        <!-- Page B: Position + Best (purple) -->
        <div class="cycle-page inactive" id="positionPage">
          <div class="pos-layout">
            <div class="pos-number"><span class="skew-accent">P—</span></div>
            <div class="pos-meta">
              <div class="pos-meta-row">Lap <span class="val">—</span></div>
              <div class="pos-meta-row"><span class="val purple">—:——.———</span></div>
            </div>
          </div>
        </div>
        <div class="cycle-dots"><div class="cycle-dot active" id="dotRating"></div><div class="cycle-dot" id="dotPos"></div></div>
      </div>

      <div class="panel gaps-block">
        <div class="gap-item">
          <div class="panel-label">Ahead</div>
          <div class="gap-time ahead">—</div>
          <div class="gap-driver">—</div>
          <div class="gap-ir"></div>
        </div>
        <div class="gap-item">
          <div class="panel-label">Behind</div>
          <div class="gap-time behind">—</div>
          <div class="gap-driver">—</div>
          <div class="gap-ir"></div>
        </div>
      </div>
    </div>

    <!-- COL: Tachometer -->
    <div class="panel tacho-block">
      <div class="tacho-top-row">
        <div class="tacho-gear" id="gearText">N</div>
        <div class="tacho-speed-cluster">
          <span class="tacho-rpm" id="rpmText" style="color: var(--text-dim);">0</span>
          <div class="speed-value" id="speedText">0</div>
          <div class="speed-unit">MPH</div>
        </div>
      </div>
      <div class="tacho-bar-track" id="tachoBar"></div>
    </div>

    <!-- COL: Logo (two stacked squares) -->
    <div class="logo-col">
      <div class="logo-square">
        <img src="logomark.png" alt="K10 Media Coach" />
      </div>
      <div class="logo-square" id="carLogoSquare">
        <!-- BMW logo (default — switchable via JS) -->
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" id="carLogoSvg">
          <circle cx="40" cy="40" r="36" fill="none" stroke="#c0c0c0" stroke-width="3"/>
          <circle cx="40" cy="40" r="28" fill="none" stroke="#c0c0c0" stroke-width="1" opacity="0.5"/>
          <path d="M 40 12 A 28 28 0 0 1 68 40 L 40 40 Z" fill="white"/>
          <path d="M 40 68 A 28 28 0 0 1 12 40 L 40 40 Z" fill="white"/>
          <path d="M 12 40 A 28 28 0 0 1 40 12 L 40 40 Z" fill="#0066B1"/>
          <path d="M 68 40 A 28 28 0 0 1 40 68 L 40 40 Z" fill="#0066B1"/>
        </svg>
      </div>
    </div>

  </div><!-- /main-area -->

  <!-- COMMENTARY — hidden by default, shown via showCommentary() -->
  <div class="commentary-col" id="commentaryCol" style="--commentary-h: 0;">
    <div class="commentary-inner" id="commentaryInner">
      <div class="commentary-title" id="commentaryTitle"></div>
      <div class="commentary-text" id="commentaryText"></div>
      <div class="commentary-meta" id="commentaryMeta"></div>
    </div>
  </div>

</div><!-- /dashboard -->


<script>
  // ═══ CAR MANUFACTURER LOGOS (inline SVG strings) ═══
  const carLogos = {
    bmw: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
      <circle cx="40" cy="40" r="36" fill="none" stroke="#c0c0c0" stroke-width="3"/>
      <circle cx="40" cy="40" r="28" fill="none" stroke="#c0c0c0" stroke-width="1" opacity="0.5"/>
      <path d="M 40 12 A 28 28 0 0 1 68 40 L 40 40 Z" fill="white"/>
      <path d="M 40 68 A 28 28 0 0 1 12 40 L 40 40 Z" fill="white"/>
      <path d="M 12 40 A 28 28 0 0 1 40 12 L 40 40 Z" fill="#0066B1"/>
      <path d="M 68 40 A 28 28 0 0 1 40 68 L 40 40 Z" fill="#0066B1"/>
    </svg>`,
    mclaren: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
      <circle cx="40" cy="40" r="37" fill="none" stroke="#FF8000" stroke-width="2.5"/>
      <g transform="translate(40, 40)">
        <path d="M -12 -15 L -12 15" fill="none" stroke="#FF8000" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M 12 -15 L 12 15" fill="none" stroke="#FF8000" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M -12 -15 L 0 5" fill="none" stroke="#FF8000" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M 0 5 L 12 -15" fill="none" stroke="#FF8000" stroke-width="2.5" stroke-linecap="round"/>
      </g>
    </svg>`,
    mazda: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
      <circle cx="40" cy="40" r="37" fill="none" stroke="#c0c0c0" stroke-width="1.5"/>
      <g transform="translate(40, 40)">
        <path d="M -15 10 L -8 -12 L -2 10" fill="none" stroke="#cc0000" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
        <path d="M 2 10 L 8 -12 L 15 10" fill="none" stroke="#cc0000" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
        <line x1="-15" y1="10" x2="15" y2="10" stroke="#cc0000" stroke-width="2" stroke-linecap="round"/>
      </g>
    </svg>`,
    nissan: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
      <circle cx="40" cy="40" r="37" fill="none" stroke="#c0c0c0" stroke-width="1.5"/>
      <circle cx="40" cy="40" r="30" fill="none" stroke="#c0c0c0" stroke-width="1" opacity="0.5"/>
      <path d="M 10 40 A 30 30 0 0 1 70 40 Z" fill="#c0c0c0" opacity="0.85"/>
      <path d="M 70 40 A 30 30 0 0 1 10 40 Z" fill="#c00" opacity="0.15"/>
      <line x1="10" y1="40" x2="70" y2="40" stroke="#c0c0c0" stroke-width="2"/>
      <text x="40" y="43" text-anchor="middle" fill="#c0c0c0" font-family="Arial,sans-serif" font-size="10" font-weight="bold" letter-spacing="1">NISSAN</text>
    </svg>`,
    dallara: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
      <circle cx="40" cy="40" r="37" fill="none" stroke="#c00" stroke-width="1.5"/>
      <g transform="translate(40, 40)">
        <line x1="-8" y1="-15" x2="-8" y2="15" stroke="#c00" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M -8 -8 Q 5 -12 10 -2" fill="none" stroke="#c00" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M 10 -2 L 12 8" fill="none" stroke="#c00" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M 12 8 Q 5 14 -4 12" fill="none" stroke="#c00" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M -4 12 L -8 4" fill="none" stroke="#c00" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="14" y1="-8" x2="18" y2="-4" stroke="#c00" stroke-width="1.5" opacity="0.6" stroke-linecap="round"/>
      </g>
    </svg>`,
    ferrari: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
      <path d="M 15 15 L 65 15 L 65 40 Q 40 70 40 70 Q 15 70 15 40 Z" fill="#FFD700" fill-opacity="0.9" stroke="#c00" stroke-width="2" stroke-linejoin="round"/>
      <g transform="translate(40, 38)">
        <ellipse cx="0" cy="5" rx="12" ry="8" fill="#1a1a1a"/>
        <circle cx="10" cy="-8" r="5" fill="#1a1a1a"/>
        <path d="M 8 -2 Q 10 2 8 8" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
        <line x1="6" y1="13" x2="10" y2="26" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="-6" y1="13" x2="-10" y2="20" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M 12 -12 Q 14 -8 12 -4" fill="none" stroke="#1a1a1a" stroke-width="1" stroke-linecap="round"/>
      </g>
      <rect x="20" y="15" width="40" height="4" fill="#00843D" rx="1"/>
      <rect x="30" y="15" width="20" height="4" fill="white" rx="1"/>
      <rect x="40" y="15" width="10" height="4" fill="#c00" rx="1"/>
    </svg>`,
    porsche: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
      <path d="M 18 12 L 62 12 L 62 38 Q 40 68 40 68 Q 18 68 18 38 Z" fill="#1a1a1a" stroke="#B5985A" stroke-width="2" stroke-linejoin="round"/>
      <line x1="40" y1="12" x2="40" y2="68" stroke="#B5985A" stroke-width="1.5"/>
      <line x1="18" y1="40" x2="62" y2="40" stroke="#B5985A" stroke-width="1.5"/>
      <rect x="19" y="13" width="20" height="26" fill="#c00" fill-opacity="0.25" rx="1"/>
      <rect x="41" y="13" width="20" height="26" fill="#c00" fill-opacity="0.25" rx="1"/>
      <g transform="translate(40, 28)">
        <path d="M 0 -8 Q 4 -10 6 -6 L 6 -2 Q 4 2 0 2 Q -4 2 -6 -2 L -6 -6 Q -4 -10 0 -8" fill="#B5985A"/>
        <path d="M 0 -8 L 2 -12 M 0 -8 L -2 -12" stroke="#B5985A" stroke-width="1" stroke-linecap="round"/>
      </g>
      <path d="M 22 44 L 28 44 L 28 50 L 22 50 Z" fill="#c00" opacity="0.3"/>
      <path d="M 32 44 L 38 44 L 38 50 L 32 50 Z" fill="#B5985A" opacity="0.3"/>
      <path d="M 42 44 L 48 44 L 48 50 L 42 50 Z" fill="#B5985A" opacity="0.3"/>
      <path d="M 52 44 L 58 44 L 58 50 L 52 50 Z" fill="#c00" opacity="0.3"/>
    </svg>`
  };
  const carLogoOrder = ['bmw', 'mclaren', 'mazda', 'nissan', 'dallara', 'ferrari', 'porsche'];
  let currentCarLogoIdx = 0;

  function cycleCarLogo() {
    currentCarLogoIdx = (currentCarLogoIdx + 1) % carLogoOrder.length;
    const key = carLogoOrder[currentCarLogoIdx];
    document.getElementById('carLogoSquare').innerHTML = carLogos[key];
  }

  // ═══ TACHOMETER ═══
  const TACH_SEGS = 11;
  const tachoBar = document.getElementById('tachoBar');
  const rpmText = document.getElementById('rpmText');
  for (let i = 0; i < TACH_SEGS; i++) {
    const s = document.createElement('div');
    s.className = 'tacho-seg';
    tachoBar.appendChild(s);
  }

  const RPM_COLORS = {
    green: 'var(--green)',
    yellow: 'var(--amber)',
    red: 'var(--red)',
    dim: 'var(--text-dim)',
  };

  function updateTacho(pct) {
    const segs = tachoBar.children;
    const lit = Math.round(pct * TACH_SEGS);
    let topColor = 'dim';
    for (let i = 0; i < TACH_SEGS; i++) {
      segs[i].className = 'tacho-seg';
      if (i < lit) {
        const f = i / TACH_SEGS;
        if (f < 0.55) { segs[i].classList.add('lit-green'); topColor = 'green'; }
        else if (f < 0.73) { segs[i].classList.add('lit-yellow'); topColor = 'yellow'; }
        else if (f < 0.91) { segs[i].classList.add('lit-red'); topColor = 'red'; }
        else { segs[i].classList.add('lit-redline'); topColor = 'red'; }
      }
    }
    rpmText.style.color = RPM_COLORS[topColor];
  }
  updateTacho(0); // Will be driven by SimHub RPM data

  // ═══ LAYERED PEDAL HISTOGRAMS ═══
  const HIST_BARS = 20;
  function setupHist(id, cls) {
    const c = document.getElementById(id);
    for (let i = 0; i < HIST_BARS; i++) {
      const b = document.createElement('div');
      b.className = `pedal-hist-bar ${cls}`;
      if (i === HIST_BARS - 1) b.classList.add('live');
      c.appendChild(b);
    }
  }
  setupHist('throttleHist', 'throttle');
  setupHist('brakeHist', 'brake');
  setupHist('clutchHist', 'clutch');

  function renderHist(id, data) {
    const bars = document.getElementById(id).children;
    for (let i = 0; i < data.length && i < bars.length; i++)
      bars[i].style.height = Math.max(1, data[i] * 100) + '%';
  }
  // Initialize empty — SimHub will push live data
  renderHist('throttleHist', new Array(HIST_BARS).fill(0));
  renderHist('brakeHist', new Array(HIST_BARS).fill(0));
  renderHist('clutchHist', new Array(HIST_BARS).fill(0));

  // ═══ COMMENTARY ═══
  const col = document.getElementById('commentaryCol');
  const dash = document.getElementById('dashboard');
  const inner = document.getElementById('commentaryInner');

  function showCommentary(hue, title, text, meta) {
    col.style.setProperty('--commentary-h', hue);
    inner.style.background = `hsla(${hue}, 50%, 22%, 0.48)`;
    inner.style.borderColor = `hsla(${hue}, 50%, 45%, 0.25)`;
    document.getElementById('commentaryTitle').textContent = title;
    document.getElementById('commentaryTitle').style.color = `hsl(${hue},55%,65%)`;
    document.getElementById('commentaryText').textContent = text;
    document.getElementById('commentaryMeta').textContent = meta;
    col.classList.add('visible');
    dash.style.setProperty('--sentiment-h', hue);
    dash.style.setProperty('--sentiment-s', '40%');
    dash.style.setProperty('--sentiment-l', '20%');
    dash.style.setProperty('--sentiment-alpha', '0.06');
  }
  function hideCommentary() {
    col.classList.remove('visible');
    dash.style.setProperty('--sentiment-alpha', '0');
  }

  // ═══ CYCLING PANELS (rating/position only — fuel/tyres no longer cycle) ═══
  let ratingActive = true;

  function cycleRatingPos() {
    const r = document.getElementById('ratingPage');
    const p = document.getElementById('positionPage');
    const d1 = document.getElementById('dotRating');
    const d2 = document.getElementById('dotPos');
    if (ratingActive) {
      r.classList.replace('active', 'inactive');
      p.classList.replace('inactive', 'active');
      d1.classList.remove('active'); d2.classList.add('active');
    } else {
      p.classList.replace('active', 'inactive');
      r.classList.replace('inactive', 'active');
      d2.classList.remove('active'); d1.classList.add('active');
    }
    ratingActive = !ratingActive;
  }

  // Cycling interval — call cycleRatingPos() from SimHub timer or JS setInterval
  // setInterval(cycleRatingPos, 45000);

  // ═══ iRATING BAR CHART ═══
  function updateIRBar(iRating) {
    const maxIR = 5000;
    const pct = Math.min(100, (iRating / maxIR) * 100);
    document.getElementById('irBarFill').style.width = pct + '%';
  }
  updateIRBar(0); // Will be set from session data

  // ═══ SAFETY RATING PIE CHART ═══
  function updateSRPie(srValue) {
    const pct = Math.min(1, srValue / 4.0);
    const circ = 2 * Math.PI * 15; // ~94.25
    const offset = circ * (1 - pct);
    const fill = document.getElementById('srPieFill');
    fill.setAttribute('stroke-dashoffset', offset);
    // Color: green if > 3.0, amber if > 2.0, red if lower
    if (srValue >= 3.0) fill.setAttribute('stroke', 'var(--green)');
    else if (srValue >= 2.0) fill.setAttribute('stroke', 'var(--amber)');
    else fill.setAttribute('stroke', 'var(--red)');
    // text label removed
  }
  updateSRPie(0); // Will be set from session data

  // ═══ FLASH SYSTEM ═══
  function flashElement(el, className) {
    el.classList.remove(className);
    void el.offsetWidth;
    el.classList.add(className);
    setTimeout(() => el.classList.remove(className), 1500);
  }
</script>
</body>
</html>
